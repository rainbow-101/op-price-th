<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OP Price TH</title>

<style>
body{
font-family:Arial,sans-serif;
background:#111827;
color:white;
padding:20px;
margin:0;
}

h1{
text-align:center;
}

.search{
width:100%;
padding:15px;
border-radius:10px;
border:none;
font-size:16px;
box-sizing:border-box;
margin-bottom:20px;
}

.card{
background:#1f2937;
padding:15px;
border-radius:12px;
margin-bottom:10px;
}

.price{
color:#22c55e;
font-size:22px;
font-weight:bold;
}
</style>
</head>
<body>

<h1>🏴‍☠️ OP Price TH</h1>

<input
id="searchInput"
class="search"
placeholder="ค้นหาการ์ด..."
>

<div id="cards"></div>

<script>

let allCards = [];

fetch("cards.json")
.then(res => res.json())
.then(data => {
    allCards = data;
    showCards(data);
});

function showCards(cards){

    const container =
    document.getElementById("cards");

    container.innerHTML =
    cards.map(card => `
        <div class="card">
            <h3>${card.name}</h3>
            <p>${card.code}</p>
            <p>${card.rarity}</p>
            <div class="price">
                ${card.price} บาท
            </div>
        </div>
    `).join("");

}

document
.getElementById("searchInput")
.addEventListener("input", function(){

    const keyword =
    this.value.toLowerCase();

    const filtered =
    allCards.filter(card =>
        card.name.toLowerCase().includes(keyword)
        ||
        card.code.toLowerCase().includes(keyword)
    );

    showCards(filtered);

});

</script>

</body>
</html>
.price{
font-size:24px;
font-weight:bold;
color:#22c55e;
}
</style>
</head>
<body>

<div class="header">
<h1>🏴‍☠️ OP Price TH</h1>
<p>เช็กราคาการ์ด One Piece ภาษาไทย</p>
</div>

<input
class="search"
placeholder="ค้นหาการ์ด เช่น OP01-025 หรือ Luffy"
/>

<div class="card">
<h2>Monkey D. Luffy</h2>
<p>OP01-003</p>
<p>Rarity: R</p>
<div class="price">300 บาท</div>
</div>

<div class="card">
<h2>Roronoa Zoro</h2>
<p>OP01-025</p>
<p>Rarity: SR</p>
<div class="price">450 บาท</div>
</div>

</body>
</html>
